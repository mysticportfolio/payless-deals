<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payless Deals - Vehicle Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen">
    <div class="login-container">
      <h1>Payless Deals</h1>
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button id="loginBtn" class="btn btn-primary">Login</button>
      <button id="signupBtn" class="btn">Sign Up</button>
      <p id="authError" style="color: red;"></p>
    </div>
  </div>

  <!-- Main App -->
  <div id="appScreen" style="display: none;">
    <nav class="navbar">
      <div class="nav-brand">Payless Deals</div>
      <div class="nav-items">
        <button class="nav-btn active" data-section="dashboard">Dashboard</button>
        <button class="nav-btn" data-section="vehicles">Vehicles</button>
        <button class="nav-btn" data-section="admin" id="adminTab" style="display: none;">Admin</button>
      </div>
      <button id="logoutBtn" class="btn">Logout</button>
    </nav>

    <main>
      <section id="dashboard" class="content-section">
        <h1>Dashboard</h1>
        <div class="stats">
          <div class="card">
            <h3>My Vehicles</h3>
            <p class="stat-number" id="totalVehicles">0</p>
          </div>
        </div>
      </section>

      <section id="vehicles" class="content-section" style="display: none;">
        <div class="section-header">
          <h2>My Vehicles</h2>
          <button class="btn btn-primary" id="addVehicleBtn">+ Add Vehicle</button>
        </div>
        <div id="vehicleList" class="vehicle-grid" style="margin-top: 20px;"></div>
        
        <div id="vehicleModal" class="modal">
          <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add New Vehicle</h2>
            <form id="vehicleForm">
              <div class="form-group">
                <label>Make</label>
                <input type="text" id="vehicleMake" required>
              </div>
              <div class="form-group">
                <label>Model</label>
                <input type="text" id="vehicleModel" required>
              </div>
              <div class="form-group">
                <label>Year</label>
                <input type="number" id="vehicleYear" required>
              </div>
              <div class="form-group">
                <label>License Plate</label>
                <input type="text" id="vehicleLicense" required>
              </div>
              <div class="form-group">
                <label>VIN</label>
                <input type="text" id="vehicleVIN">
              </div>
              <div class="form-group">
                
<label>Mileage</label>
              <input type="number" id="vehicleMileage" required>
            </div>
            <button type="submit" class="btn btn-primary">Save Vehicle</button>
          </form>
        </div>
      </div>
    </section>

    <section id="admin" class="content-section" style="display: none;">
      <h1>Admin Dashboard</h1>
      <p>Total Users: <span id="totalUsers">0</span></p>
      <p>Total Vehicles: <span id="allVehiclesCount">0</span></p>
      <h3>All Vehicles</h3>
      <div id="allVehiclesList" class="vehicle-grid"></div>
    </section>
  </main>
</div>

<!-- Firebase SDKs - THIS PART IS MANDATORY -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
