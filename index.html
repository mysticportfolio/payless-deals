<!DOCTYPE html>
<html>
<head>
  <title>Payless Auto Ghana - All kinds of Cars for Sale in Accra and Beyond</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Buy and sell quality cars in Ghana. Best deals on Toyota, Honda, Hyundai, etc. Call 0538858862">
   <link rel="stylesheet" href="styleS.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://mysticportfolio.github.io/payless-deals/logo.jpg" alt="Payless Auto Ghana Logo">
      <h1>PAYLESS AUTO GHANA</h1>
    </div>
    <div class="contact-bar">
      <a href="tel:0538858862">Call: 0538858862</a>
      <a href="https://wa.me/233257746659" class="whatsapp-btn" target="_blank">WhatsApp Us</a>
    </div>
  </header>

  <div class="container">
    <div id="auth-section">
      <h2>Dealer Login</h2>
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button id="login-btn">Log In</button>
      <button id="signup-btn">Sign Up</button>
    </div>

    <div id="app-section" class="hidden">
      <div class="nav">
        <button id="logout-btn">Log Out</button>
        <span id="user-email"></span>
        <button id="toggle-form-btn">+ Add Vehicle</button>
      </div>

      <div id="vehicle-form" class="hidden">
        <h3 id="form-title">Add Vehicle</h3>
        <input type="hidden" id="vehicle-id">
        <input id="make" placeholder="Make: Toyota">
        <input id="model" placeholder="Model: Corolla">
        <input id="year" type="number" placeholder="Year">
        <input id="price" type="number" placeholder="Price in GHS">
        <input id="mileage" type="number" placeholder="Mileage">
        <input id="location" placeholder="Location: Accra, Kumasi">
        <textarea id="description" placeholder="Description + Phone number for buyers"></textarea>
        <input id="image" type="file" accept="image/*" multiple>
        <label><input type="checkbox" id="featured"> Mark as Featured - GHS 50</label>
        <button id="save-vehicle-btn">Save Vehicle</button>
        <button id="cancel-edit-btn">Cancel</button>
      </div>

      <div class="search-bar">
        <input id="search-make" placeholder="Search Make: Toyota">
        <select id="filter-year">
          <option value="">Any Year</option>
          <option value="2020">2020+</option>
          <option value="2015">2015+</option>
          <option value="2010">2010+</option>
        </select>
        <select id="filter-price">
          <option value="">Any Price</option>
          <option value="20000">Under GHS 20k</option>
          <option value="50000">Under GHS 50k</option>
          <option value="100000">Under GHS 100k</option>
        </select>
        <button id="search-btn">Search</button>
      </div>

      <h2>Latest Cars</h2>
      <div id="vehicles-list" class="vehicle-grid"></div>
    </div>
  </div>

  <footer>
    <p><strong>Payless Auto Ghana</strong> - Best Car Deals in Ghana</p>
    <p>Call: 0538858862 / 0257746659 | Email: Emmanuelcarlos680@gmail.com</p>
    <p>Location: Accra, Ghana</p>

  <script type="module" src="script.js"></script>
