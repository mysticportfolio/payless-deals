<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payless Deals - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="main-header">
    <div class="header-content">
      <div class="logo">
        <img src="https://imgur.com/Z3ytn2l" alt="Payless Deals Logo"
        <div>
          <h1>🚗 PAYLESS DEALS</h1>
          <p>Quality Cars at Unbeatable Prices</p>
        </div>
      </div>
      <div class="header-actions">
        <span id="user-email"></span>
        <button id="logout-btn" onclick="logout()" style="display:none;">Log Out</button>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <div class="tabs-content">
      <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
      <button class="tab" onclick="showTab('vehicles')">Vehicles</button>
      <button class="tab" onclick="showTab('add-vehicle')">Add Vehicle</button>
      <button class="tab" onclick="showTab('dealer')">Dealer Login</button>
    </div>
  </nav>

  <main>
    <!-- Dashboard Tab -->
    <div id="dashboard" class="tab-panel active">
      <h2>Dashboard</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <p class="stat-label">TOTAL VEHICLES</p>
          <p class="stat-number" id="total-vehicles">0</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">FEATURED</p>
          <p class="stat-number" id="featured-vehicles">0</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">SOLD THIS MONTH</p>
          <p class="stat-number">0</p>
        </div>
      </div>
      <div class="alert-box">
        <span>⚠️</span>
        <p>Connect Firebase to start adding vehicles</p>
      </div>
    </div>

    <!-- Vehicles Tab -->
    <div id="vehicles" class="tab-panel">
      <h2>Vehicle Inventory</h2>
      <div id="vehicle-list">
        <p style="color:#888;">No vehicles added yet.</p>
      </div>
    </div>

    <!-- Add Vehicle Tab -->
    <div id="add-vehicle" class="tab-panel">
      <h2>Add New Vehicle</h2>
      <div class="form-card">
        <input type="text" id="make" placeholder="Make: Toyota">
        <input type="text" id="model" placeholder="Model: Corolla">
        <input type="number" id="year" placeholder="Year: 2020">
        <input type="number" id="price" placeholder="Price in GHS">
        <input type="number" id="mileage" placeholder="Mileage">
        <input type="text" id="location" placeholder="Location: Accra, Kumasi">
        <textarea id="description" placeholder="Description + Phone number for buyers"></textarea>
        <input type="file" id="vehicle-images" multiple>
        <label style="display:flex;align-items:center;gap:10px;margin:15px 0;">
          <input type="checkbox" id="featured" style="width:auto;">
          Mark as Featured - GHS 50
        </label>
        <button onclick="saveVehicle()">Save Vehicle</button>
      </div>
    </div>

    <!-- Dealer Login Tab -->
    <div id="dealer" class="tab-panel">
      <h2>Dealer Login</h2>
      <div class="form-card">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Log In</button>
        <button onclick="signup()" class="btn-secondary">Sign Up</button>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 Payless Deals. All rights reserved.</p>
  </footer>

  <script>
    function showTab(tabName) {
      document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }
    function login() { alert('Firebase login coming next'); }
    function signup() { alert('Firebase signup coming next'); }
    function logout() { alert('Logged out'); }
    function saveVehicle() { alert('Connect Firebase Storage first to save cars'); }
  </script>
</body>
</html>
